name: Bug Report
description: Report a general bug in PTO Runtime
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide details to help us reproduce and fix the issue.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform does this occur on?
      options:
        - a2a3 (Ascend 910B/C hardware)
        - a2a3sim (Ascend 910B/C simulation)
        - a5 (Ascend 950 hardware)
        - a5sim (Ascend 950 simulation)
        - All / Unknown
    validations:
      required: true

  - type: dropdown
    id: runtime_variant
    attributes:
      label: Runtime Variant
      description: Which runtime variant is affected?
      options:
        - tensormap_and_ringbuffer
        - host_build_graph
        - All / Unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: e.g., "Ring buffer deadlocks when task window is smaller than 128"
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run the example with small ring sizes...
        2. Observe the timeout...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: e.g., "Example should complete within 60 seconds"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if applicable
      placeholder: |
        ```
        Paste error messages or describe unexpected behavior here
        ```
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Git Commit ID
      description: "Exact commit hash where the issue occurs. Run `git rev-parse HEAD` to get the current commit ID."
      placeholder: e.g., f04cde8a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d
    validations:
      required: true

  - type: input
    id: cann_version
    attributes:
      label: CANN Version
      description: "CANN toolkit version. Run `cat /usr/local/Ascend/ascend-toolkit/latest/version.cfg` or check with `npu-smi info`."
      placeholder: e.g., 8.0.RC3.alpha003
    validations:
      required: false

  - type: input
    id: driver_version
    attributes:
      label: Driver Version
      description: "Ascend driver version. Run `npu-smi info` and check the driver version line."
      placeholder: e.g., 24.1.rc3
    validations:
      required: false

  - type: dropdown
    id: host_platform
    attributes:
      label: Host Platform
      description: OS and CPU architecture of the host machine
      options:
        - Linux (x86_64)
        - Linux (aarch64)
        - macOS (aarch64)
        - Other (please specify)
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information that might help (device logs, profiling data, etc.)
    validations:
      required: false
